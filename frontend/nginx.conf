server {
    listen ${PORT};
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass https://smartcity-backend-554896342930.us-central1.run.app/api/;
        proxy_set_header Host smartcity-backend-554896342930.us-central1.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy uploads to backend
    location /uploads/ {
        proxy_pass https://smartcity-backend-554896342930.us-central1.run.app/uploads/;
        proxy_set_header Host smartcity-backend-554896342930.us-central1.run.app;
    }

    # Proxy H2 console
    location /h2-console/ {
        proxy_pass https://smartcity-backend-554896342930.us-central1.run.app/h2-console/;
        proxy_set_header Host smartcity-backend-554896342930.us-central1.run.app;
    }

    # React Router — all other routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
