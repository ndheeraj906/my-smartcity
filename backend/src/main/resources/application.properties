# H2 Database (default - works out of the box)
spring.datasource.url=jdbc:h2:file:./data/smartcity_ecommerce;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# To switch to PostgreSQL, comment out the H2 config above and uncomment below:
# spring.datasource.url=jdbc:postgresql://localhost:5432/smartcity_ecommerce
# spring.datasource.username=postgres
# spring.datasource.password=YOUR_PASSWORD

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

jwt.secret=mySecretKeyForJWTTokenGenerationThatIsLongEnoughForHS256Algorithm123456
jwt.expiration=86400000

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
file.upload-dir=./uploads

server.port=8080

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
